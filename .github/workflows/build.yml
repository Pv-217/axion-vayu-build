name: Build AxionOS for vayu

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Maximize Build Space & Aggressive Cleanup
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 512
        swap-size-mb: 4096
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'

    - name: Extra Cleanup
      run: |
        df -h
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache /usr/local/graalvm /usr/local/share/chromium /usr/local/share/powershell /usr/share/swift /usr/local/lib/node_modules /opt/ghc* /usr/local/.ghcup /var/lib/docker
        docker system prune -a -f || true
        sudo apt-get clean
        df -h

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Repo Tool & Initialize Sync
      run: |
        # Setup repo tool properly
        mkdir -p \~/bin
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > \~/bin/repo
        chmod a+x \~/bin/repo
        echo 'export PATH=\~/bin:$PATH' >> $GITHUB_ENV
        
        # Wait a moment for PATH
        sleep 2
        
        mkdir -p android/axion
        cd android/axion
        
        repo init -u https://github.com/AxionAOSP/android.git -b lineage-23.2 --git-lfs --depth=1
        
        mkdir -p .repo/local_manifests
        cat > .repo/local_manifests/axion.xml << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <project name="AxionOS-Devices/device_xiaomi_vayu" path="device/xiaomi/vayu" remote="github" />
          <project name="AxionOS-Devices/vendor_xiaomi_vayu" path="vendor/xiaomi/vayu" remote="github" />
          <project name="LineageOS/android_kernel_xiaomi_vayu" path="kernel/xiaomi/vayu" remote="github" />
        </manifest>
        EOF
        
        repo sync -c --no-clone-bundle --no-tags --optimized-fetch --prune --force-sync --current-branch -j2
      shell: bash

    - name: Setup build environment
      run: |
        cd android/axion
        source build/envsetup.sh
        echo "Build environment ready"

    - name: Compile ROM
      run: |
        cd android/axion
        source build/envsetup.sh
        
        export USE_CCACHE=1
        export CCACHE_EXEC=$(which ccache)
        ccache -M 15G
        
        axion vayu userdebug
        ax -br -j2
        
        echo "=== Build Complete ==="
        ls -lh out/target/product/vayu/

    - name: Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: AxionOS-vayu-${{ github.run_id }}
        path: out/target/product/vayu/AxionOS*.zip
        retention-days: 7

    - name: Post-Build Cleanup
      if: always()
      run: |
        df -h
