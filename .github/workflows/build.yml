name: Build AxionOS for vayu

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Maximize Build Space & Aggressive Cleanup
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 512
        swap-size-mb: 4096
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Extra Cleanup
      run: |
        echo "=== Free Space Before Extra Cleanup ==="
        df -h
        
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache \
                   /usr/local/graalvm /usr/local/share/chromium /usr/local/share/powershell \
                   /usr/share/swift /usr/local/lib/node_modules /usr/share/az_* \
                   /opt/ghc* /usr/local/.ghcup /usr/lib/jvm /var/lib/docker /var/cache/*
        
        docker system prune -a -f || true
        sudo apt-get clean
        sudo apt-get autoremove -y
        sudo rm -rf /var/lib/apt/lists/*
        
        echo "=== Free Space After Cleanup ==="
        df -h

    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialize Repo and Sync
      run: |
        mkdir -p \~/bin
        PATH=\~/bin:$PATH
        curl https://storage.googleapis.com/git-repo-downloads/repo > \~/bin/repo
        chmod a+x \~/bin/repo
        
        mkdir -p android/axion
        cd android/axion
        
        repo init -u https://github.com/AxionAOSP/android.git -b lineage-23.2 --git-lfs
        
        mkdir -p .repo/local_manifests
        cat > .repo/local_manifests/axion.xml << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <project name="AxionOS-Devices/device_xiaomi_vayu" path="device/xiaomi/vayu" remote="github" />
          <project name="AxionOS-Devices/vendor_xiaomi_vayu" path="vendor/xiaomi/vayu" remote="github" />
          <project name="LineageOS/android_kernel_xiaomi_vayu" path="kernel/xiaomi/vayu" remote="github" />
        </manifest>
        EOF
        
        # Sync with lower parallelism to save space
        repo sync -c --no-clone-bundle --no-tags --optimized-fetch --prune --force-sync --current-branch -j3

    - name: Setup build environment
      run: |
        cd android/axion
        source build/envsetup.sh
        echo "Build environment ready"

    - name: Compile ROM
      run: |
        cd android/axion
        source build/envsetup.sh
        
        # Enable ccache with size limit
        export USE_CCACHE=1
        export CCACHE_EXEC=$(which ccache)
        ccache -M 20G
        
        axion vayu userdebug
        ax -br -j3   # Reduced jobs to prevent OOM and disk pressure
        
        echo "=== Build Complete ==="
        ls -lh out/target/product/vayu/

    - name: Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: AxionOS-vayu-${{ github.run_id }}
        path: |
          out/target/product/vayu/AxionOS*.zip
          out/target/product/vayu/*.img
        retention-days: 14
        compression-level: 0

    - name: Post-Build Cleanup
      if: always()
      run: |
        cd android/axion 2>/dev/null || true
        rm -rf out/target/product/vayu/obj out/target/product/vayu/intermediates 2>/dev/null || true
        echo "=== Final Disk Space ==="
        df -h
