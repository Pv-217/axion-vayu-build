name: Build AxionOS for vayu

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Maximize build disk space
      uses: easimon/maximize-build-space@v2
      with:
        root-reserve-mb: 2048
        swap-size-mb: 16384

    - name: Additional Cleanup
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/hostedtoolcache
        sudo rm -rf /usr/local/graalvm
        sudo rm -rf /usr/local/share/chromium
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/share/swift
        sudo rm -rf /usr/local/lib/node_modules
        sudo rm -rf /usr/share/az_* 2>/dev/null || true
        sudo rm -rf /usr/share/miniconda 2>/dev/null || true
        sudo rm -rf /opt/ghc* 2>/dev/null || true
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        df -h

    - name: Free space from docker images
      run: |
        docker system prune -a -f || true
        docker volume prune -f || true
        df -h

    - name: Check available space
      run: |
        echo "=== Disk Space Before Build ==="
        df -h /
        df -h /home/runner
        FREE_GB=$(df -BG /home/runner | awk 'NR==2{print $4}' | tr -d 'G')
        echo "Free space: ${FREE_GB}GB"

    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialize Repo and Sync
      run: |
        mkdir -p ~/bin
        PATH=~/bin:$PATH
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        
        mkdir -p android/axion
        cd android/axion
        
        repo init -u https://github.com/AxionAOSP/android.git -b lineage-23.2 --git-lfs
        
        mkdir -p .repo/local_manifests
        cat > .repo/local_manifests/axion.xml << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <project name="AxionOS-Devices/device_xiaomi_vayu" path="device/xiaomi/vayu" remote="github" />
          <project name="AxionOS-Devices/vendor_xiaomi_vayu" path="vendor/xiaomi/vayu" remote="github" />
          <project name="LineageOS/android_kernel_xiaomi_vayu" path="kernel/xiaomi/vayu" remote="github" />
        </manifest>
        EOF
        
        repo sync -c --no-clone-bundle --no-tags --optimized-fetch --prune --force-sync --current-branch -j4

    - name: Setup build environment
      run: |
        cd android/axion
        source build/envsetup.sh
        echo "Build environment ready"

    - name: Compile ROM
      run: |
        cd android/axion
        source build/envsetup.sh
        axion vayu userdebug
        ax -br -j4
        echo "=== Build Complete ==="
        ls -lh out/target/product/vayu/

    - name: Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: AxionOS-vayu-${{ github.run_id }}
        path: |
          out/target/product/vayu/*.zip
          out/target/product/vayu/*.img
        retention-days: 14
        compression-level: 0

    - name: Post-Build Cleanup
      if: always()
      run: |
        cd android/axion 2>/dev/null || true
        rm -rf out/target/product/vayu/obj 2>/dev/null || true
        rm -rf out/target/product/vayu/intermediates 2>/dev/null || true
        echo "=== Final Disk Space ==="
        df -h /
