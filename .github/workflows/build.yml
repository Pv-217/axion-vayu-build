name: Build AxionOS for vayu

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Maximize Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 512
        swap-size-mb: 8192

    - name: Cleanup
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache /usr/local/graalvm /usr/share/swift /usr/local/lib/node_modules
        df -h

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup & Shallow Sync
      run: |
        mkdir -p \~/bin
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > \~/bin/repo
        chmod a+x \~/bin/repo
        sudo cp \~/bin/repo /usr/local/bin/repo

        mkdir -p android/axion && cd android/axion
        
        repo init -u https://github.com/AxionAOSP/android.git -b lineage-23.2 --git-lfs --depth=1
        
        mkdir -p .repo/local_manifests
        cat > .repo/local_manifests/axion.xml << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <project name="AxionOS-Devices/device_xiaomi_vayu" path="device/xiaomi/vayu" remote="github" />
          <project name="AxionOS-Devices/vendor_xiaomi_vayu" path="vendor/xiaomi/vayu" remote="github" />
          <project name="LineageOS/android_kernel_xiaomi_vayu" path="kernel/xiaomi/vayu" remote="github" />
        </manifest>
        EOF
        
        repo sync -c --no-clone-bundle --no-tags --optimized-fetch --prune --force-sync -j1 --depth=1
      shell: bash

    - name: Build
      run: |
        cd android/axion
        source build/envsetup.sh
        export USE_CCACHE=1
        ccache -M 10G
        axion vayu userdebug
        ax -br -j2
        ls -lh out/target/product/vayu/
