name: Build AxionOS for vayu

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 512
        swap-size-mb: 4096

    - name: Extra Cleanup
      run: |
        df -h
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache /usr/local/graalvm /usr/local/share/chromium /usr/share/swift /usr/local/lib/node_modules
        docker system prune -a -f || true

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Repo Tool & Sync
      run: |
        # Install repo tool correctly
        mkdir -p /usr/local/bin
        curl -s https://storage.googleapis.com/git-repo-downloads/repo > /usr/local/bin/repo
        chmod a+x /usr/local/bin/repo
        
        mkdir -p android/axion
        cd android/axion
        
        repo init -u https://github.com/AxionAOSP/android.git -b lineage-23.2 --git-lfs --depth=1
        
        mkdir -p .repo/local_manifests
        cat > .repo/local_manifests/axion.xml << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <manifest>
          <project name="AxionOS-Devices/device_xiaomi_vayu" path="device/xiaomi/vayu" remote="github" />
          <project name="AxionOS-Devices/vendor_xiaomi_vayu" path="vendor/xiaomi/vayu" remote="github" />
          <project name="LineageOS/android_kernel_xiaomi_vayu" path="kernel/xiaomi/vayu" remote="github" />
        </manifest>
        EOF
        
        repo sync -c --no-clone-bundle --no-tags --optimized-fetch --prune --force-sync -j2
      shell: bash

    - name: Setup build environment
      run: |
        cd android/axion
        source build/envsetup.sh

    - name: Compile ROM
      run: |
        cd android/axion
        source build/envsetup.sh
        
        export USE_CCACHE=1
        ccache -M 12G
        
        axion vayu userdebug
        ax -br -j2

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: AxionOS-vayu
        path: out/target/product/vayu/AxionOS*.zip
        retention-days: 7
